services:
  nitpick:
    build: .
    image: nitpick
    container_name: nitpick-agent

    # Tier A: Secret Tier
    env_file:
      - path: ${NITPICKERS_DIR:-/home/tomo/project/nitpickers}/.env
        required: true # Tool-level secrets (Must exist - always use absolute path)
      - path: ${TARGET_PROJECT_PATH:-.}/.env
        required: false # Project-specific secrets (Optional for init)

    # Mount target project directory to /app
    volumes:
      - ${TARGET_PROJECT_PATH:-.}:/app

      # Git authentication - SSH keys only (not .gitconfig to avoid conflicts)
      - ${HOME}/.ssh:/root/.ssh:ro

      # SSH Agent socket (for SSH agent forwarding)
      - ${SSH_AUTH_SOCK:-/dev/null}:${SSH_AUTH_SOCK:-/dev/null}
      # Optional: Mount global config if exists
      # - ${HOME}/.nitpick/.env:/root/.nitpick/.env



    environment:
      # Pass Host UID/GID to fix permission issues
      - HOST_UID=${UID:-1000}
      - HOST_GID=${GID:-1000}

      # SSH Agent forwarding (recommended for security)
      - SSH_AUTH_SOCK=${SSH_AUTH_SOCK}

      # GitHub Token (alternative to SSH)
      # You can pass this via terminal: GITHUB_TOKEN=$(gh auth token) docker-compose run ...
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}

      # -----------------------------------------------------------------------
      # Key fix: redirect uv's venv to a container-only location.
      # Without this, 'uv sync' inside Docker writes .venv at /app/.venv and
      # the activate script hardcodes VIRTUAL_ENV="/app/.venv". When the user
      # sources that venv on their host machine, uv warns about the path
      # mismatch on every subsequent 'uv sync' run.
      # By pointing UV_PROJECT_ENVIRONMENT to /opt/..., the host .venv is
      # never touched by Docker, so the host venv stays clean.
      - UV_PROJECT_ENVIRONMENT=/opt/nitpick_project_venv

      # Flag for nitpick code to detect it is running inside Docker
      - DOCKER_CONTAINER=true
      # -----------------------------------------------------------------------

      # Tier B: Tuning Tier (Version-controlled configuration)
      - NITPICK_AUDITOR_MODEL=openrouter/nvidia/nemotron-3-super-120b-a12b:free
      - NITPICK_REVIEWER__SMART_MODEL=openrouter/nvidia/nemotron-3-super-120b-a12b:free
      - NITPICK_RCA_MODEL=openrouter/google/gemini-2.0-flash-001
      - NITPICK_NUM_AUDITORS=1
      - NITPICK_REVIEWS_PER_AUDITOR=2
      - NITPICK_MAX_ITERATIONS=4
      - JULES_STALE_SESSION_TIMEOUT_SECONDS=3600
      - JULES_MODEL=gemini-3-flash
      #- JULES_MODEL=gemini-3.1-pro
      # Final Resort for Git Identity (if still facing issues)
      # - GIT_AUTHOR_NAME=Nitpick-Agent
      # - GIT_AUTHOR_EMAIL=agent@nitpick.com

      # Keep container alive or run command
      # entrypoint.sh is the entrypoint, CMD is passed to it
    command: [ "nitpick" ]

    # Interactive mode support
    stdin_open: true
    tty: true

    # Enable GPU support for domain-specific computations
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
